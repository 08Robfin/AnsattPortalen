<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ikke IT-relatert - CAROB AS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <a href="#main" class="skip-link">Hopp til innhold</a>

  <nav class="site-nav" aria-label="Hovednavigasjon">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="CAROB AS - til forsiden">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="6" fill="#2E7D6B"/>
          <rect x="7" y="8" width="14" height="2.5" rx="1.25" fill="white"/>
          <rect x="7" y="12.75" width="10" height="2.5" rx="1.25" fill="white"/>
          <rect x="7" y="17.5" width="12" height="2.5" rx="1.25" fill="white"/>
        </svg>
        CAROB AS
      </a>
      <ul class="nav-links" role="list">
        <li><a href="index.html">Hjem</a></li>
        <li><a href="it-support.html">IT støtte</a></li>
        <li><a href="hms.html">HMS</a></li>
        <li><a href="rutiner.html">Systemer</a></li>
      </ul>
      <button class="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="Åpne meny">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <rect x="2" y="5" width="18" height="2" rx="1" fill="currentColor"/>
          <rect x="2" y="10" width="18" height="2" rx="1" fill="currentColor"/>
          <rect x="2" y="15" width="18" height="2" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </nav>

  <main id="main" style="max-width:520px; margin: 4rem auto; padding: 0 var(--space-md); text-align:center;">
    <div style="font-size:clamp(4rem,15vw,7rem); font-weight:700; color:var(--color-border); line-height:1; margin-bottom:1rem;" aria-hidden="true">404</div>
    <h1 style="font-size:1.4rem; color:var(--color-primary); margin-bottom:0.75rem;">Dette er ikke en IT-relatert side</h1>
    <p style="color:var(--color-muted); font-size:0.95rem; line-height:1.7;">
      Så den har vi ikke gjort for dette prosjektet.
    </p>
    <a href="index.html" class="btn btn--primary" style="display:inline-block; margin-top:1.5rem;">Tilbake til forsiden</a>
  </main>

  <script>
    const toggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    if (toggle && navLinks) {
      toggle.addEventListener('click', () => {
        const open = navLinks.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
      });
    }
  </script>

</body>
</html>
